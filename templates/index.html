<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Outfit App</title>

    
    <link rel="stylesheet" href="{{url_for('static',filename='style.css')}}">
    
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <h2>🌦 Weather Outfit</h2>
        <div>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
            
        </div>
    </div>

    <!-- Main content -->
    <div class="container">
        <div class="card">
            <h3>Check Weather Outfit</h3>

            <form method="POST">
                <input type="text" name="city" placeholder="Enter city name" required>
                <br>
                <button>Check Weather</button>
            </form>

            {% if error %}
            <div class="error">
                <p><strong>ERROR: </strong>{{error}}</p>
            </div>
            {% endif %}

            {% if temperature %}
            <div class="result">
                <p><strong>Temperature:</strong> {{ temperature }}°C</p>
                <p>{{ suggestion }}</p>
            </div>
            {% endif %}
        </div>
    </div>

</body>
</html>
